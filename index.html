<div id="welcome-screen">
  <div class="lang-switcher">

      <option value="zh-CN">简体中文</option>

      <option value="en">English</option>
    </select>
  </div>
  <div class="welcome-card">

    <div class="welcome-sub" id="welcome-sub">Enter your city and explore how far you can drive in a weekend</div>
    <div class="welcome-search-wrap">
      <input type="text" id="welcome-input" autocomplete="off" spellcheck="false" placeholder="Search city..." />
      <span class="welcome-search-icon">⌕</span>
      <button id="welcome-locate-btn" class="welcome-locate-btn" title="定位当前位置">📍</button>
    </div>
    <div id="welcome-results"></div>
    <div class="welcome-quick">
      <div class="welcome-quick-label" id="welcome-quick-label">Popular cities</div>
      <div class="welcome-quick-cities" id="welcome-quick-cities"></div>
    </div>
  </div>

  </div>
</div>

<div id="map"></div>

<div class="title-overlay" id="title-overlay-card">
  <div class="title-text">
    <div class="en">Ox and Horse Escape Plan</div>
    <h1>牛马逃离计划</h1>
    <div class="sub" id="title-sub">...</div>
  </div>
</div>

<div class="top-controls">
  <div class="search-box">
    <input type="text" id="city-search" placeholder="搜索出发城市..." />
    <div id="search-results"></div>
  </div>
  <div class="lang-switcher">
    <select id="lang-select">
      <option value="zh-CN">简体中文</option>

</div>

<script>
// ── i18n ──
const LANG_FILES = { 'zh-CN': 'lang/zh-CN.js', 'zh-TW': 'lang/zh-TW.js', en: 'lang/en.js', ja: 'lang/ja.js' };

function t(key, vars) {
  let s = window.LANG?.[key] || key;
  if (vars) Object.entries(vars).forEach(([k, v]) => { s = s.replace(`{${k}}`, v); });
  return s;
}

function applyLang() {
  document.documentElement.lang = window.LANG?.code || 'zh-CN';
  document.querySelector('.title-overlay .en').textContent = t('titleEn');
  document.querySelector('.title-overlay h1').textContent = t('title');
  document.getElementById('city-search').placeholder = t('searchPlaceholder');
  document.querySelector('.legend h3').textContent = t('legend');
  // legend items: origin, originCity, provinceBorder, cityBorder
  const legendItems = document.querySelectorAll('.legend > .item');
  if (legendItems[0]) legendItems[0].querySelector('span:last-child').textContent = t('origin');
  if (legendItems[1]) legendItems[1].querySelector('span:last-child').textContent = t('originCity', { city: typeof currentCityName !== 'undefined' ? currentCityName : '' });
  if (legendItems[2]) legendItems[2].querySelector('span:last-child').textContent = t('provinceBorder');
  if (legendItems[3]) legendItems[3].querySelector('span:last-child').textContent = t('cityBorder');
  // subtitle and page title — 只在有城市数据时更新，且不覆盖 URL 指定的城市
  const _urlCity = new URLSearchParams(window.location.search).get('city');
  if (typeof currentCityName !== 'undefined' && !_urlCity) {
    document.getElementById('title-sub').textContent = t('subtitle', { city: currentCityName });
    document.title = t('pageTitle', { city: currentCityName });
    document.getElementById('legend-origin').textContent = t('originCity', { city: currentCityName });
  }
  // 更新欢迎屏文案
  const wh = document.getElementById('welcome-headline');
  const ws = document.getElementById('welcome-sub');
  const wql = document.getElementById('welcome-quick-label');
  const wi = document.getElementById('welcome-input');
  if (wh) wh.textContent = t('welcomeHeadline');
  if (ws) ws.textContent = t('welcomeSub');
  if (wql) wql.textContent = t('welcomeQuickLabel');
  if (wi) wi.placeholder = t('searchPlaceholder');
  // 重建快捷城市标签
  const cities = window.LANG?.welcomeCities || [];
  const wrap = document.getElementById('welcome-quick-cities');
  if (wrap) {
    wrap.innerHTML = '';
    cities.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'welcome-city-tag';
      btn.textContent = name;
      btn.onclick = () => welcomeSelectCity(name);
      wrap.appendChild(btn);
    });
  }
}

function loadLang(code) {
  return new Promise((resolve, reject) => {
    const old = document.getElementById('lang-script');
    const s = document.createElement('script');
    s.id = 'lang-script';
    s.src = (LANG_FILES[code] || LANG_FILES['zh-CN']) + '?v=2';
    s.onload = () => { resolve(); };
    s.onerror = reject;
    old.parentNode.replaceChild(s, old);
  });
}

// 根据浏览器语言自动选择，localStorage 优先
function detectLang() {
  const browserLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (browserLang.startsWith('ja')) return 'ja';
  if (browserLang.startsWith('zh-tw') || browserLang.startsWith('zh-hk') || browserLang.startsWith('zh-hant')) return 'zh-TW';
  if (browserLang.startsWith('zh')) return 'zh-CN';
  if (browserLang.startsWith('en')) return 'en';
  return 'en'; // 其他语言 fallback 英语
}

(function() {
  const saved = localStorage.getItem('lang') || detectLang();
  const sel = document.getElementById('lang-select');
  const welcomeSel = document.getElementById('welcome-lang-select');
  sel.value = saved;
  if (welcomeSel) welcomeSel.value = saved;
  if (saved !== 'zh-CN') {
    loadLang(saved).then(() => {
      // 确保 DOM 完全就绪后再更新文案
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyLang);
      } else {
        applyLang();
      }
    });
  } else {
    // zh-CN 是默认语言文件，DOM 就绪后 apply
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', applyLang);
    } else {
      applyLang();
    }
  }
  function onLangChange(code) {
    localStorage.setItem('lang', code);
    sel.value = code;
    if (welcomeSel) welcomeSel.value = code;
    loadLang(code).then(applyLang);
  }
  sel.addEventListener('change', () => onLangChange(sel.value));
  if (welcomeSel) welcomeSel.addEventListener('change', () => onLangChange(welcomeSel.value));
})();
</script>

// ── 工具函数 ──
function haversine(lng1, lat1, lng2, lat2) {
  const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function estimateDriveTime(lng, lat) {
  const dist = haversine(currentOrigin[0], currentOrigin[1], lng, lat);
  const roadDist = Math.round(dist * 1.35);
  const time = Math.round(roadDist / 85 * 10) / 10;
  return { time, dist: roadDist };
}

function getDriveData(feature) {
  const code = String(feature?.properties?.adcode || "");
  if (driveDataMap[code]) return driveDataMap[code];
  const center = feature?.properties?.centroid || feature?.properties?.center;
  if (!center || center.length !== 2) return null;
  const est = estimateDriveTime(center[0], center[1]);
  return { name: feature?.properties?.name || "", time: est.time, dist: est.dist, estimated: true };
}

function getBandColor(time) {
  if (typeof time !== "number") return "#d3d3d3";
  for (const b of colorBands) {
    if (time >= b.min && time < b.max) return b.color;
  }
  return colorBands[colorBands.length - 1].color;
}

function fmtTime(t) {
  return typeof t !== "number" ? "--" : Number.isInteger(t) ? `${t}` : `${t.toFixed(1)}`;
}

function styleCounty(feature) {
  const d = getDriveData(feature);
  return {
    color: "#fff",
    weight: 1,
    opacity: 0.8,
    fillOpacity: 0.75,
    fillColor: d ? getBandColor(d.time) : "#d3d3d3"
  };
}

// ── 标签 ──
function updateLabels() {
  labelLayer.clearLayers();
  const zoom = map.getZoom();
  const bounds = map.getBounds();
  const placed = [];

  const allFeatures = [
    ...allCountyFeatures.filter(f => { const d = getDriveData(f); if(!d) return false; if(String(f?.properties?.adcode)===originAdcode) return true; if(d.time>MAX_DRIVE_HOURS) return false; const c=f?.properties?.centroid||f?.properties?.center; if(c){const sd=haversine(currentOrigin[0],currentOrigin[1],c[0],c[1]); if(sd>MAX_STRAIGHT_KM) return false;} return true; }).map(f => ({ f, core: true })),
    ...allGrayFeatures.map(f => ({ f, core: false }))
  ];

  allFeatures.sort((a, b) => {
    const da = getDriveData(a.f);
    const db = getDriveData(b.f);
    if (String(a.f?.properties?.adcode) === originAdcode) return -1;
    if (String(b.f?.properties?.adcode) === originAdcode) return 1;
    if (a.core && !b.core) return -1;
    if (!a.core && b.core) return 1;
    return (da?.time || 99) - (db?.time || 99);
  });

  // detail: 0=名字, 1=名字+耗时, 2=名字+耗时+距离
  const cfg = zoom >= 11 ? { fs: 11, fsGray: 9, minD: 12, detail: 2 }
            : zoom >= 10 ? { fs: 10, fsGray: 8, minD: 16, detail: 2 }
            : zoom >= 9  ? { fs: 9,  fsGray: 7, minD: 18, detail: 2 }
            : zoom >= 8  ? { fs: 8,  fsGray: 6, minD: 14, detail: 1 }
            : zoom >= 7  ? { fs: 7,  fsGray: 5, minD: 10, detail: 1 }
            :              { fs: 6,  fsGray: 5, minD: 8,  detail: 0 };

  for (const { f, core } of allFeatures) {
    const driveInfo = getDriveData(f);
    const name = driveInfo?.name || f?.properties?.name || "";
    if (!name) continue;

    const center = f?.properties?.centroid || f?.properties?.center;
    if (!center || center.length !== 2) continue;
    const ll = L.latLng(center[1], center[0]);
    if (!bounds.contains(ll)) continue;

    const pt = map.latLngToContainerPoint(ll);
    if (placed.some(p => Math.abs(p.x - pt.x) < cfg.minD && Math.abs(p.y - pt.y) < cfg.minD)) continue;
    placed.push(pt);

    let text, fs, cls;
    if (core && driveInfo) {
      fs = cfg.fs;
      cls = "county-label";
      if (cfg.detail >= 2) {
        text = `${name}\n${fmtTime(driveInfo.time)}h / ${driveInfo.dist}km`;
      } else if (cfg.detail >= 1) {
        text = `${name}\n${fmtTime(driveInfo.time)}h`;
      } else {
        text = name;
      }
    } else {
      fs = cfg.fsGray;
      cls = "county-label gray";
      text = name;
    }

    L.marker(ll, {
      interactive: false,
      icon: L.divIcon({
        className: cls,
        html: `<span style="font-size:${fs}px">${text}</span>`,
        iconSize: [1,1]
      })
    }).addTo(labelLayer);
  }
}

      // 如果POI搜索没有结果，回退到行政区划搜索
      const url2 = `https://restapi.amap.com/v3/config/district?key=${key}&keywords=${encodeURIComponent(query)}&subdistrict=0&extensions=base`;
      const res2 = await fetch(url2);

        searchResults.innerHTML = `<div class="result-item" style="color:#888">${t('noResult')}</div>`;
        searchResults.style.display = "block";

        const name = item.name;
        const center = item.center; // "lng,lat" 格式

      }).join("");
      searchResults.style.display = "block";
      searchResults.querySelectorAll(".result-item[data-lng]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          const lng = parseFloat(el.dataset.lng);
          const lat = parseFloat(el.dataset.lat);
          const name = el.dataset.name;
          const cc = el.dataset.cc;
          isSelectingCity = true; // 标记正在选择城市
          searchInput.value = name; // 更新输入框
          searchResults.style.display = "none"; // 隐藏结果
          showLoading(t('loading'));
          switchCity(name, lng, lat, cc);
          setTimeout(() => { isSelectingCity = false; }, 100); // 延迟重置标记
        });
      });
      return;
    }
    searchResults.innerHTML = data.pois.map((item, i) => {
      const name = item.name;
      const location = item.location; // "lng,lat" 格式
      // 构建完整地址
      let fullAddress = '';
      if (item.pname && item.cityname && item.adname && item.address) {
        fullAddress = `${item.pname}${item.cityname}${item.adname}${item.address}`;
      } else if (item.pname && item.cityname && item.adname) {
        fullAddress = `${item.pname}${item.cityname}${item.adname}${item.name}`;
      } else if (item.pname && item.adname) {
        fullAddress = `${item.pname}${item.adname}${item.name}`;
      } else {
        fullAddress = item.address || item.name;
      }
      return `<div class="result-item" data-idx="${i}" data-lng="${location.split(',')[0]}" data-lat="${location.split(',')[1]}" data-name="${name}" data-cc="cn">
        <div>${name}</div>
        <div class="result-sub">${fullAddress}</div>
      </div>`;
    }).join("");
    searchResults.style.display = "block";
    searchResults.querySelectorAll(".result-item[data-lng]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation(); // 阻止事件冒泡
        const lng = parseFloat(el.dataset.lng);
        const lat = parseFloat(el.dataset.lat);
        const name = el.dataset.name;
        const cc = el.dataset.cc;
        isSelectingCity = true; // 标记正在选择城市
        searchInput.value = name; // 更新输入框
        searchResults.style.display = "none"; // 隐藏结果
        showLoading(t('loading'));
        switchCity(name, lng, lat, cc);
        setTimeout(() => { isSelectingCity = false; }, 100); // 延迟重置标记
      });
    });
  } catch(e) {
    console.error('搜索失败:', e);
    searchResults.innerHTML = `<div class="result-item" style="color:#888">${t('searchFailed')}</div>`;
    searchResults.style.display = "block";
  }
}

// 高德地图 API：获取行政区域数据
function geoURL(code) {
  const key = '6db4289a25ce8104d8a6607311568479';
  return `https://restapi.amap.com/v3/config/district?key=${key}&keywords=${code}&subdistrict=3&extensions=all`;
}

async function fetchJSON(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(url);
    return r.json();
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// 并发控制：最多同时 N 个请求
async function parallelLimit(tasks, limit = 5) {
  const results = [];
  let i = 0;
  async function worker() {
    while (i < tasks.length) {
      const idx = i++;
      results[idx] = await tasks[idx]();
    }
  }
  await Promise.all(Array.from({ length: Math.min(limit, tasks.length) }, () => worker()));
  return results;
}

// 加载省下面所有市 → 每个市的区县
// 直辖市 adcode（省级 _full 直接返回区级，不需要再往下钻）
const DIRECT_MUNICIPALITIES = new Set([110000, 120000, 310000, 500000]);

// 使用 DataV API 获取完整的 GeoJSON 数据
async function loadDataVGeoJSON(adcode) {
  const url = `https://geo.datav.aliyun.com/areas_v3/bound/${adcode}_full.json`;
  console.log('加载 DataV 数据:', url);
  
  // 尝试从预加载缓存读取
  if (preloadCache.provinces[adcode]) {
    console.log('使用预加载缓存:', adcode);
    return preloadCache.provinces[adcode];
  }
  
  // 尝试从 localStorage 缓存读取
  const cacheKey = `datav_${adcode}`;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (parsed && parsed.timestamp && (Date.now() - parsed.timestamp) < 7 * 24 * 60 * 60 * 1000) {
        console.log('使用缓存的 DataV 数据:', adcode);
        const data = parsed.data;
        preloadCache.provinces[adcode] = data; // 也存入预加载缓存
        return data;
      }
    }
  } catch(e) {}
  
  try {
    const res = await fetchJSON(url);
    // 保存到预加载缓存
    preloadCache.provinces[adcode] = res;
    // 保存到 localStorage
    try {
      localStorage.setItem(cacheKey, JSON.stringify({ data: res, timestamp: Date.now() }));
    } catch(e) {}
    return res;
  } catch(e) {
    console.warn('DataV API 加载失败:', e);
    return null;
  }
}

// 预加载附近省份数据（后台静默加载）
async function preloadNearbyProvinces(lng, lat) {
  const nearProvinces = [];
  for (const prov of PROVINCES) {
    if (prov.code >= 710000) continue;
    if (preloadCache.provinces[prov.code]) continue; // 已缓存
    if (preloadCache.loading.has(prov.code)) continue; // 正在加载
    const dist = haversine(lng, lat, prov.center[0], prov.center[1]);
    if (dist < 600) nearProvinces.push(prov);
  }
  
  if (nearProvinces.length === 0) return;
  
  console.log(`预加载 ${nearProvinces.length} 个省份数据`);
  
  // 后台加载，不阻塞主流程
  const loadPromises = nearProvinces.slice(0, 3).map(async (prov) => {
    preloadCache.loading.add(prov.code);
    try {
      await loadDataVGeoJSON(prov.code);
    } catch(e) {
      console.warn(`预加载省份 ${prov.code} 失败:`, e);
    } finally {
      preloadCache.loading.delete(prov.code);
    }
  });
  
  // 不 await，让它在后台运行
  Promise.all(loadPromises).then(() => {
    console.log('预加载完成');
  });
}

async function loadProvinceCounties(provAdcode) {
  try {
    console.log('加载省份:', provAdcode);
    
    // 使用 DataV API 加载省份数据
    const provJson = await loadDataVGeoJSON(provAdcode);
    if (!provJson) {
      console.error('无法加载省份数据:', provAdcode);
      return { provAdcode, provOutline: null, cityResults: [] };
    }
    
    const provFeatures = provJson.features || [];
    console.log('省份特征数量:', provFeatures.length);
    
    const provOutline = provFeatures.find(f => Number(f?.properties?.adcode) === provAdcode) || null;
    console.log('找到省份轮廓:', provOutline ? '是' : '否');

    // 直辖市：省级返回的直接是区县
    if (DIRECT_MUNICIPALITIES.has(provAdcode)) {
      const districts = provFeatures.filter(f => Number(f?.properties?.adcode) !== provAdcode);
      console.log('直辖市区县数量:', districts.length);
      return {
        provAdcode, provOutline,
        cityResults: [{ adcode: provAdcode, counties: districts, outline: provOutline }]
      };
    }

    // 普通省：先提取城市，再为每个城市加载区县
    const cities = provFeatures.filter(f => {
      const adcode = Number(f?.properties?.adcode || 0);
      return adcode !== provAdcode && String(adcode).endsWith('00');
    });
    console.log('找到城市数量:', cities.length);

    const cityTasks = cities.map(city => async () => {
      const cityCode = Number(city?.properties?.adcode);
      const cityName = city?.properties?.name || '';
      console.log('加载城市:', cityName, cityCode);
      
      const cityJson = await loadDataVGeoJSON(cityCode);
      if (!cityJson) {
        console.warn('无法加载城市数据:', cityName, cityCode);
        return { adcode: cityCode, counties: [city], outline: city };
      }
      
      const cityFeatures = cityJson.features || [];
      const counties = cityFeatures.filter(f => Number(f?.properties?.adcode) !== cityCode);
      
      console.log('城市:', cityName, '区县数量:', counties.length);
      return { 
        adcode: cityCode, 
        counties: counties.length > 0 ? counties : [city], 
        outline: city 
      };
    });
    
    // 提高并发度到 5，加快城市数据加载
    const cityResults = await parallelLimit(cityTasks, 5);
    console.log('城市结果数量:', cityResults.length);

    return { provAdcode, provOutline, cityResults };
  } catch(e) {
    console.error('加载省份数据失败:', e);
    return { provAdcode, provOutline: null, cityResults: [] };
  }
}

// ── OSRM 批量驾车时间（优化版：并行请求 + 超时控制） ──
async function fetchOSRMBatch(originLng, originLat, destinations) {
  const results = {};
  const batchSize = 100;

  async function fetchWithTimeout(url, timeoutMs = 15000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) return null;
      return res.json();
    } catch(e) {
      clearTimeout(timer);
      return null;
    }
  }

  const batches = [];
  for (let i = 0; i < destinations.length; i += batchSize) {
    batches.push(destinations.slice(i, i + batchSize));
  }

  // 并行请求，最多 3 个并发
  const concurrency = 3;
  let idx = 0;
  async function worker() {
    while (idx < batches.length) {
      const bi = idx++;
      const batch = batches[bi];
      const coords = `${originLng},${originLat};` + batch.map(d => `${d.lng},${d.lat}`).join(";");
      const destIndices = batch.map((_, j) => j + 1).join(";");
      const url = `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&destinations=${destIndices}&annotations=duration,distance`;

      const data = await fetchWithTimeout(url);
      if (data && data.code === "Ok") {
        const durations = data.durations[0];
        const distances = data.distances[0];
        batch.forEach((d, j) => {
          const timeSec = durations[j];
          const distM = distances[j];
          if (timeSec != null && timeSec > 0) {
            results[d.adcode] = {
              name: d.name,
              time: Math.round(timeSec / 360) / 10,
              dist: Math.round(distM / 1000)
            };
          }
        });
      }

      // 批次间短间隔
      if (idx < batches.length) {
        await new Promise(r => setTimeout(r, 200));
      }
    }
  }

  await Promise.all(Array.from({ length: Math.min(concurrency, batches.length) }, () => worker()));
  return results;
}

// ── 渲染地图 ──
function renderMap(skipFitBounds = false) {
  // 清除旧图层（OSRM 刷新时需要重新渲染）
  const savedProvOutlines = activeLayers._provOutlines;
  // 暴力清除所有非底图图层，确保没有残留色块
  map.eachLayer(layer => {
    if (layer !== labelLayer && !layer._url) { // 保留 tileLayer（有 _url）和 labelLayer
      map.removeLayer(layer);
    }
  });
  activeLayers = [];
  activeLayers._provOutlines = savedProvOutlines;
  labelLayer.clearLayers();

  // 找 origin adcode
  originAdcode = null;
  let minDist = Infinity;
  for (const f of allCountyFeatures) {
    const c = f?.properties?.centroid || f?.properties?.center;
    if (c) {
      const d = haversine(currentOrigin[0], currentOrigin[1], c[0], c[1]);
      if (d < minDist) { minDist = d; originAdcode = String(f?.properties?.adcode || ""); }
    }
  }

  // 标记 origin
  if (originAdcode && driveDataMap[originAdcode]) {
    driveDataMap[originAdcode].isOrigin = true;
    driveDataMap[originAdcode].time = 0;
    driveDataMap[originAdcode].dist = 0;
  }

  // 灰色背景
  if (allGrayFeatures.length) {
    const grayLayer = L.geoJSON({ type: "FeatureCollection", features: allGrayFeatures }, {
      style: {
        color: "#ccc",
        weight: 0.5,
        opacity: 0.5,
        fillColor: "#e5e2da",
        fillOpacity: 0.45
      },
      onEachFeature(feature, layer) {
        const name = feature?.properties?.name || "";
        if (name) layer.bindTooltip(name, { sticky: true });
      }
    }).addTo(map);
    activeLayers.push(grayLayer);
  }

  // 灰色区域的市界
  if (allGrayCityOutlines.length) {
    const grayBorderLayer = L.geoJSON({ type: "FeatureCollection", features: allGrayCityOutlines.filter(Boolean) }, {
      style: { color: "rgba(255,255,255,0.5)", weight: 1.5, opacity: 0.6, fill: false },
      interactive: false
    }).addTo(map);
    activeLayers.push(grayBorderLayer);
  }

  // 过滤掉超过 MAX_DRIVE_HOURS 或直线距离过远的区县（避免飞地）
  const visibleFeatures = allCountyFeatures.filter(f => {
    const d = getDriveData(f);
    if (!d) return false;
    if (String(f?.properties?.adcode) === originAdcode) return true;
    if (d.time > MAX_DRIVE_HOURS) return false;
    // 直线距离检查：防止远处孤立区县通过高速连通导致飞地
    const center = f?.properties?.centroid || f?.properties?.center;
    if (center) {
      const straightDist = haversine(currentOrigin[0], currentOrigin[1], center[0], center[1]);
      if (straightDist > MAX_STRAIGHT_KM) return false;
    }
    return true;
  });

  // 县区填充层
  const countyLayer = L.geoJSON({ type: "FeatureCollection", features: visibleFeatures }, {
    style: styleCounty,
    onEachFeature(feature, layer) {
      const code = String(feature?.properties?.adcode || "");
      const isOriginCounty = (code === originAdcode);

      layer.on("mouseover", () => {
        countyLayer.resetStyle();
        layer.setStyle({ weight: 2.5, color: "#333", fillOpacity: 0.9 });
        layer.bringToFront();
        activeLayers.forEach(l => { if (l._isCityBorder || l._isProvBorder) l.bringToFront(); });
        showInfo(getDriveData(feature));
        // 恢复 origin hatch
        countyLayer.eachLayer(l => {
          const lc = String(l.feature?.properties?.adcode || "");
          if (lc === originAdcode && l._path && lc !== code) {
            l._path.setAttribute("fill", "url(#originHatch)");
            l._path.setAttribute("fill-opacity", "1");
          }
        });
      });
      layer.on("mouseout", () => {
        countyLayer.resetStyle(layer);
        infoPanel.style.display = "none";
        if (isOriginCounty && layer._path) {
          layer._path.setAttribute("fill", "url(#originHatch)");
          layer._path.setAttribute("fill-opacity", "1");
        }
      });
      layer.on("click", e => {
        L.DomEvent.stopPropagation(e);
        console.log('区县被点击:', feature?.properties?.name, feature?.properties?.adcode);
        showInfo(getDriveData(feature));
        showScenicSpots(feature);
      });

      if (isOriginCounty) {
        layer.on("add", () => {
          if (layer._path) {
            layer._path.style.fill = "url(#originHatch)";
            layer._path.style.fillOpacity = "1";
          }
        });
      }
    }
  }).addTo(map);
  activeLayers.push(countyLayer);

  // 点击地图关闭面板
  map.on("click", () => {
    infoPanel.style.display = "none";
    scenicPanel.classList.remove("active");
    currentScenicAdcode = null;
    countyLayer.resetStyle();
  });
  map.getContainer().addEventListener("mouseleave", () => {
    countyLayer.resetStyle();
    infoPanel.style.display = "none";
  });

  // 市界
  const cityBorderLayer = L.geoJSON({ type: "FeatureCollection", features: allCityOutlines.filter(Boolean) }, {
    style(f) {
      const originCityCode = originAdcode ? Number(originAdcode.slice(0,4) + "00") : 0;
      const isOrigin = Number(f?.properties?.adcode) === originCityCode;
      return { color: isOrigin ? "#e88" : "rgba(255,255,255,0.5)", weight: isOrigin ? 2.5 : 1.5, opacity: isOrigin ? 0.8 : 0.6, fill: false };
    },
    interactive: false
  }).addTo(map);
  cityBorderLayer._isCityBorder = true;
  activeLayers.push(cityBorderLayer);

  // 省界
  const provinceOutlines = activeLayers._provOutlines || [];
  if (provinceOutlines.length) {
    const provBorderLayer = L.geoJSON({ type: "FeatureCollection", features: provinceOutlines }, {
      style: { color: "#888", weight: 2, dashArray: "6 6", fill: false, opacity: 0.8 },
      interactive: false
    }).addTo(map);
    provBorderLayer._isProvBorder = true;
    activeLayers.push(provBorderLayer);
  }

  // SVG hatch
  setTimeout(() => {
    const svg = map.getPanes().overlayPane.querySelector("svg");
    if (svg) {
      let defs = svg.querySelector("defs") || svg.insertBefore(document.createElementNS("http://www.w3.org/2000/svg", "defs"), svg.firstChild);
      if (!svg.querySelector("#originHatch")) {
        const pat = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
        pat.setAttribute("id", "originHatch");
        pat.setAttribute("patternUnits", "userSpaceOnUse");
        pat.setAttribute("width", "8");
        pat.setAttribute("height", "8");
        pat.setAttribute("patternTransform", "rotate(45)");
        const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bg.setAttribute("width", "8"); bg.setAttribute("height", "8"); bg.setAttribute("fill", "#fff");
        const ln = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        ln.setAttribute("x", "0"); ln.setAttribute("y", "0");
        ln.setAttribute("width", "4"); ln.setAttribute("height", "8"); ln.setAttribute("fill", "#aa2211");
        pat.appendChild(bg); pat.appendChild(ln);
        defs.appendChild(pat);
      }
    }
  }, 200);

  // fitBounds（仅首次渲染，OSRM 刷新时不动视野）— 只基于可见区县
  if (!skipFitBounds && visibleFeatures.length) {
    const fitBounds = L.latLngBounds();
    visibleFeatures.forEach(f => {
      const c = f?.properties?.centroid || f?.properties?.center;
      if (c) fitBounds.extend(L.latLng(c[1], c[0]));
    });
    if (fitBounds.isValid()) map.fitBounds(fitBounds, { padding: [30, 30] });
  }

  updateLabels();
  map.off("zoomend moveend", updateLabels);
  map.on("zoomend moveend", updateLabels);
}

// ── 预设城市快速加载 ──
async function loadPresetCity(name, lng, lat, dataFile) {
  // 1. 清除旧图层
  for (const layer of activeLayers) {
    map.removeLayer(layer);
  }
  activeLayers = [];
  labelLayer.clearLayers();
  map.off("click");
  infoPanel.style.display = "none";

  // 2. 更新 origin
  currentOrigin = [lng, lat];
  currentCityName = name;
  
  // 立即更新地图视图到新的城市位置
  map.setView([lat, lng], 8);

  // 2.1 预加载附近省份数据（后台进行，不阻塞主流程）
  preloadNearbyProvinces(lng, lat);

  // 3. 更新标题 + URL
  document.getElementById("title-sub").textContent = t('subtitle', { city: name });
  document.getElementById("legend-origin").textContent = t('originCity', { city: name });
  document.title = t('pageTitle', { city: name });
  updateURL(name);

  // 4. loading
  showLoading(t('loading'));

  try {
    const res = await fetch(dataFile);
    const data = await res.json();
    
    allCountyFeatures = data.features || [];
    driveDataMap = data.driveData || {};
    allGrayFeatures = [];
    allCityOutlines = [];
    allGrayCityOutlines = [];
    activeLayers._provOutlines = [];

    renderMap();
    hideLoading();
  } catch(e) {
    console.error('Failed to load preset data:', e);
    hideLoading();
  }
}

// ── 城市切换核心逻辑 ──
// 用 Overpass 查 place=city node 获取城市核心坐标（政治经济中心而非几何中心）
async function getCityCenter(name, lng, lat) {
  try {
    const r = 0.5; // 搜索半径 ~50km
    const query = `[out:json][timeout:5];node["place"~"city|town"]["name"~"${name}"](${lat-r},${lng-r},${lat+r},${lng+r});out 1;`;
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST", body: "data=" + encodeURIComponent(query)
    });
    const data = await res.json();
    if (data.elements && data.elements.length > 0) {
      const e = data.elements[0];
      return [e.lon, e.lat];
    }
  } catch(e) {}
  return null; // fallback 用原坐标
}

async function switchCity(name, lng, lat, countryCode) {
  // 新的 AbortController，取消旧请求
  if (currentCityAbortController) currentCityAbortController.abort();
  currentCityAbortController = new AbortController();
  const signal = currentCityAbortController.signal;

  // 0. 检查是否为预设城市（快速加载）
  const preset = PRESET_CITIES[name];
  if (preset) {
    lng = preset.center[0];
    lat = preset.center[1];
    return await loadPresetCity(name, lng, lat, preset.file);
  }

  // 0.1 校准城市中心坐标（Nominatim 对大面积城市返回几何中心，不是主城区）
  const corrected = CITY_CENTERS[name] || CITY_CENTERS[name.replace(/市$/, '').replace(/白族自治州$/, '').replace(/自治州$/, '')];
  if (corrected) {
    lng = corrected[0]; lat = corrected[1];
  } else {
    const osm = await getCityCenter(name.replace(/市$/, ''), lng, lat);
    if (osm) { lng = osm[0]; lat = osm[1]; }
  }

  // 1. 清除旧图层
  for (const layer of activeLayers) {
    map.removeLayer(layer);
  }
  activeLayers = [];
  labelLayer.clearLayers();
  map.off("click");
  infoPanel.style.display = "none";

  // 2. 更新 origin
  currentOrigin = [lng, lat];
  currentCityName = name;
  
  // 立即更新地图视图到新的城市位置
  map.setView([lat, lng], 8);

  // 3. 更新标题 + URL（四处同步）
  document.getElementById("title-sub").textContent = t('subtitle', { city: name });
  document.getElementById("legend-origin").textContent = t('originCity', { city: name });
  document.title = t('pageTitle', { city: name });
  updateURL(name);

  // 4. loading
  showLoading(t('loading'));

  // 5. 判断是否在中国范围内
  const isChina = countryCode === 'cn' || (!countryCode && lat > 17 && lat < 55 && lng > 73 && lng < 136);

  allCountyFeatures = [];
  allGrayFeatures = [];
  allCityOutlines = [];
  allGrayCityOutlines = [];
  driveDataMap = {};
  const provinceOutlines = [];

  if (isChina) {
    // 中国：用 DataV API
    const nearProvinces = [];
    for (const prov of PROVINCES) {
      if (prov.code >= 710000) continue;
      const dist = haversine(lng, lat, prov.center[0], prov.center[1]);
      if (dist < 600) nearProvinces.push(prov); // 600km 缩小范围，减少加载数据量
    }

    console.log(`需要加载 ${nearProvinces.length} 个省份数据`);
    showLoading(t('loadingAdmin') + ` (0/${nearProvinces.length})`);

    // 提高省份加载并发度到 5
    let loadedCount = 0;
    const provinceTasks = nearProvinces.map(p => async () => {
      const result = await loadProvinceCounties(p.code);
      loadedCount++;
      showLoading(t('loadingAdmin') + ` (${loadedCount}/${nearProvinces.length})`);
      return result;
    });

    const nearData = await parallelLimit(provinceTasks, 5);

    for (const prov of nearData) {
      if (prov.provOutline) provinceOutlines.push(prov.provOutline);
      for (const city of prov.cityResults) {
        allCityOutlines.push(city.outline);
        for (const county of city.counties) {
          allCountyFeatures.push(county);
          const code = String(county?.properties?.adcode || "");
          const cname = county?.properties?.name || "";
          const center = county?.properties?.centroid || county?.properties?.center;
          if (center) {
            const est = estimateDriveTime(center[0], center[1]);
            driveDataMap[code] = { name: cname, time: est.time, dist: est.dist, estimated: true };
          }
        }
        if (city.counties.length === 0 && city.outline) {
          allCountyFeatures.push(city.outline);
          const code = String(city.outline?.properties?.adcode || "");
          const cname = city.outline?.properties?.name || "";
          const center = city.outline?.properties?.centroid || city.outline?.properties?.center;
          if (center) {
            const est = estimateDriveTime(center[0], center[1]);
            driveDataMap[code] = { name: cname, time: est.time, dist: est.dist, estimated: true };
          }
        }
      }
    }
  } else {
    // 海外：用 Overpass API 获取行政边界
    showLoading(t('loadingOverseas'));

    // 根据国家选择合适的行政级别
    const isJapan = countryCode === 'jp';
    const isAustralia = countryCode === 'au';
    // 欧洲国家列表（level 8 = 市/区/镇，统一处理）
    const EUROPE_CODES = new Set(['gb','fr','de','it','es','pt','nl','be','at','ch','pl','cz','se','no','dk','fi','ie','hu','ro','bg','hr','sk','si','lt','lv','ee','lu','gr']);
    const isEurope = EUROPE_CODES.has(countryCode);

    const queries = isJapan ? [
      // 日本：level 4 = 都道府県, level 7 = 市区町村, level 8 = 区/町（より詳細）
      { radius: 400000, levels: "4", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "7", labelKey: "loadingDetail" },
      { radius: 200000, levels: "8", labelKey: "loadingDetail" }
    ] : isAustralia ? [
      // 澳大利亚：level 6 = Local Government Area（Council），半径缩小避免数据过大
      { radius: 300000, levels: "6", labelKey: "loadingAdmin" }
    ] : isEurope ? [
      // 欧洲：level 4 补充城市州(柏林/汉堡等), level 6 = 省/郡, level 8 = 市镇/Borough
      { radius: 100000, levels: "4|5", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "6", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "8", labelKey: "loadingDetail" }
    ] : [
      // 其他国家
      { radius: 400000, levels: "5|6", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "4", labelKey: "loadingAdmin", fallback: true },
      { radius: 300000, levels: "7", labelKey: "loadingDetail" },
      { radius: 150000, levels: "8", labelKey: "loadingDetail" }
    ];

    for (const q of queries) {
      // fallback 查询只在前面数据太少时才执行
      if (q.fallback && allCountyFeatures.length >= 10) continue;
      showLoading(t(q.labelKey));
      const query = `[out:json][timeout:90];
        relation["boundary"="administrative"]["admin_level"~"^(${q.levels})$"]
        (around:${q.radius},${lat},${lng});
        out geom;`;

      try {
        const res = await fetch("https://overpass-api.de/api/interpreter", {
          method: "POST",
          body: "data=" + encodeURIComponent(query)
        });
        const data = await res.json();

        if (data.elements) {
          const seenIds = new Set(allCountyFeatures.map(f => f.properties.adcode));

          data.elements.forEach(el => {
            if (el.type !== "relation" || !el.members) return;
            const rCode = String(el.id);
            if (seenIds.has(rCode)) return; // 去重

            // 从 Overpass geom 构建 GeoJSON — 合并 outer ways 成环
            const outerWays = el.members.filter(m => m.type === "way" && m.role === "outer" && m.geometry);
            if (!outerWays.length) return;

            // 将多个 way 首尾相连成完整环（健壮版）
            const segments = outerWays.map(w => w.geometry.map(p => [p.lon, p.lat]));
            const rings = [];

            function ptsClose(a, b) {
              return Math.abs(a[0]-b[0]) < 0.0001 && Math.abs(a[1]-b[1]) < 0.0001;
            }

            const remaining = segments.map((s,i) => i);
            while (remaining.length > 0) {
              let ring = [...segments[remaining.shift()]];
              let changed = true;
              while (changed) {
                changed = false;
                for (let j = remaining.length - 1; j >= 0; j--) {
                  const seg = segments[remaining[j]];
                  const rEnd = ring[ring.length - 1];
                  const rStart = ring[0];
                  if (ptsClose(rEnd, seg[0])) {
                    ring.push(...seg.slice(1));
                    remaining.splice(j, 1); changed = true;
                  } else if (ptsClose(rEnd, seg[seg.length - 1])) {
                    ring.push(...[...seg].reverse().slice(1));
                    remaining.splice(j, 1); changed = true;
                  } else if (ptsClose(rStart, seg[seg.length - 1])) {
                    ring.unshift(...seg.slice(0, -1));
                    remaining.splice(j, 1); changed = true;
                  } else if (ptsClose(rStart, seg[0])) {
                    ring.unshift(...[...seg].reverse().slice(0, -1));
                    remaining.splice(j, 1); changed = true;
                  }
                }
              }
              rings.push(ring);
            }

            // 如果拼接完全失败，用各段单独作为 polygon
            if (!rings.length && segments.length) {
              segments.forEach(s => rings.push(s));
            }
            if (!rings.length) return;

            const geom = rings.length === 1
              ? { type: "Polygon", coordinates: [rings[0]] }
              : { type: "MultiPolygon", coordinates: rings.map(r => [r]) };

            // 计算质心
            const allPts = rings[0];
            let sumLng = 0, sumLat = 0;
            allPts.forEach(c => { sumLng += c[0]; sumLat += c[1]; });
            const centroid = [sumLng / allPts.length, sumLat / allPts.length];

            // 名称优先级：中文 > 英文 > 原名
            const rName = el.tags?.["name:zh"] || el.tags?.["name:en"] || el.tags?.name || "";
            const est = estimateDriveTime(centroid[0], centroid[1]);

            allCountyFeatures.push({
              type: "Feature",
              properties: { name: rName, adcode: rCode, centroid, center: centroid },
              geometry: geom
            });
            driveDataMap[rCode] = { name: rName, time: est.time, dist: est.dist, estimated: true };
            seenIds.add(rCode);
          });
        }
      } catch (e) {
        console.error("Overpass API error:", e);
      }
    }
  }

  activeLayers._provOutlines = provinceOutlines;

  // 8. 检查本地缓存（用城市坐标作为 key）
  const cacheKey = `drive_${lng.toFixed(2)}_${lat.toFixed(2)}`;
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(cacheKey)); } catch(e) {}

  if (cached && typeof cached === 'object' && Object.keys(cached).length > 0) {
    // 有缓存：直接用缓存的 OSRM 数据
    for (const [code, data] of Object.entries(cached)) {
      if (driveDataMap[code]) {
        driveDataMap[code] = { ...driveDataMap[code], ...data, estimated: false };
      }
    }
    renderMap();
    hideLoading();
    updateURL(name);
  } else {
    // 无缓存：先用估算数据渲染，再 OSRM 精确化
    renderMap();
    hideLoading();
    updateURL(name);

    // 9. OSRM 批量计算真实驾车时间（使用优化后的并行请求）
    const destinations = [];
    for (const f of allCountyFeatures) {
      const code = String(f?.properties?.adcode || "");
      const center = f?.properties?.centroid || f?.properties?.center;
      const fname = f?.properties?.name || "";
      if (center && center.length === 2) {
        destinations.push({ adcode: code, lng: center[0], lat: center[1], name: fname });
      }
    }

    showLoading(t('loadingDriveTime', { done: '0', total: '...' }));
    
    const osrmResults = await fetchOSRMBatch(lng, lat, destinations);
    
    if (!signal.aborted) {
      const osrmCache = {};
      for (const [code, result] of Object.entries(osrmResults)) {
        driveDataMap[code] = { ...driveDataMap[code], ...result, estimated: false };
        osrmCache[code] = result;
      }
      
      // 标记无法到达的点
      for (const f of allCountyFeatures) {
        const code = String(f?.properties?.adcode || "");
        if (!osrmResults[code] && driveDataMap[code] && driveDataMap[code].estimated) {
          // 保持估算值，不标记为超远
        }
      }
      
      hideLoading();
      renderMap(true);
      
      // 保存到 localStorage
      try { localStorage.setItem(cacheKey, JSON.stringify(osrmCache)); } catch(e) {}
    }
  }

  // 更新 URL
  updateURL(name);
}

  const url = new URL(window.location);
  url.searchParams.set('city', name);
  history.replaceState(null, '', url.toString());
}

// ── 定位功能 ──
function initLocateButton() {
  const btn = document.getElementById('welcome-locate-btn');
  if (!btn) return;
  
  btn.addEventListener('click', async () => {
    if (!navigator.geolocation) {
      alert('您的浏览器不支持定位功能');
      return;
    }
    
    btn.disabled = true;
    btn.textContent = '🔄';
    
    try {
      const position = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 60000
        });
      });
      
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      
      // 反向地理编码获取城市名称
      const key = '6db4289a25ce8104d8a6607311568479';
      const reverseGeocodeUrl = `https://restapi.amap.com/v3/geocode/regeo?key=${key}&location=${lng},${lat}&extensions=base&batch=false&roadlevel=0`;
      const res = await fetch(reverseGeocodeUrl);
      const data = await res.json();
      
      let cityName = '当前位置';
      const countryCode = 'cn'; // Amap is for China
      if (data.status === '1' && data.regeocode && data.regeocode.addressComponent) {
        const addr = data.regeocode.addressComponent;
        cityName = addr.city || addr.district || addr.township || '当前位置';
      }
      
      // 填充搜索框
      const input = document.getElementById('welcome-input');
      if (input) input.value = cityName;
      
      // 关闭欢迎屏并加载城市
      dismissWelcome();
      showLoading(t('loading'));
      await switchCity(cityName, lng, lat, countryCode);
      
    } catch (error) {
      console.error('定位失败:', error);
      alert('定位失败，请检查位置权限设置');
    } finally {
      btn.disabled = false;
      btn.textContent = '📍';
    }
  });
}

function initBottomControls() {

    display: none;

  `;
  document.querySelector('.bottom-controls').appendChild(bottomResults);
  
  // 阻止搜索结果框内部的点击事件冒泡
  bottomResults.addEventListener('click', (e) => {
    e.stopPropagation();
  });
  
  let bottomSearchTimer = null;
  let isSelectingCity = false; // 标记是否正在选择城市

      bottomResults.style.display = 'none';
      return;
    }
    bottomSearchTimer = setTimeout(() => searchCityBottom(q), 400);

  async function searchCityBottom(query) {
    try {
      const key = '6db4289a25ce8104d8a6607311568479';
      // 使用POI搜索API获取更详细的地址信息
      const url = `https://restapi.amap.com/v3/place/text?key=${key}&keywords=${encodeURIComponent(query)}&city=&citylimit=false&extensions=base&offset=10`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.status !== '1' || !data.pois || data.pois.length === 0) {
        // 如果POI搜索没有结果，回退到行政区划搜索
        const url2 = `https://restapi.amap.com/v3/config/district?key=${key}&keywords=${encodeURIComponent(query)}&subdistrict=0&extensions=base`;
        const res2 = await fetch(url2);
        const data2 = await res2.json();
        if (data2.status !== '1' || !data2.districts || data2.districts.length === 0) {
          bottomResults.innerHTML = `<div class="result-item" style="color:#888">${t('noResult')}</div>`;
          bottomResults.style.display = 'block';
          return;
        }
        bottomResults.innerHTML = data2.districts.map((item, i) => {
          const name = item.name;
          const level = item.level;
          const sub = level === 'city' ? '城市' : level === 'province' ? '省份' : '区县';
          const cc = 'cn';
          return `<div class="result-item" data-idx="${i}" data-lng="${item.center.split(',')[0]}" data-lat="${item.center.split(',')[1]}" data-name="${name}" data-cc="${cc}">
            <div>${name}</div>
            <div class="result-sub">${sub}</div>
          </div>`;
        }).join("");
        bottomResults.style.display = 'block';
        bottomResults.querySelectorAll(".result-item[data-lng]").forEach(el => {
          el.addEventListener("click", () => {
            const lng = parseFloat(el.dataset.lng);
            const lat = parseFloat(el.dataset.lat);
            const name = el.dataset.name;
            const cc = el.dataset.cc;
            isSelectingCity = true;
            bottomInput.value = name;
            bottomResults.style.display = "none";
            showLoading(t('loading'));
            switchCity(name, lng, lat, cc);
            setTimeout(() => { isSelectingCity = false; }, 100);
          });
        });
        return;
      }
      bottomResults.innerHTML = data.pois.map((item, i) => {
        const name = item.name;
        const cc = 'cn';
        // 构建完整地址
        let fullAddress = '';
        if (item.pname && item.cityname && item.adname && item.address) {
          fullAddress = `${item.pname}${item.cityname}${item.adname}${item.address}`;
        } else if (item.pname && item.cityname && item.adname) {
          fullAddress = `${item.pname}${item.cityname}${item.adname}${item.name}`;
        } else if (item.pname && item.adname) {
          fullAddress = `${item.pname}${item.adname}${item.name}`;
        } else {
          fullAddress = item.address || item.name;
        }
        return `<div class="result-item" data-idx="${i}" data-lng="${item.location.split(',')[0]}" data-lat="${item.location.split(',')[1]}" data-name="${name}" data-cc="${cc}">
          <div>${name}</div>
          <div class="result-sub">${fullAddress}</div>
        </div>`;
      }).join("");
      bottomResults.style.display = 'block';
      bottomResults.querySelectorAll(".result-item[data-lng]").forEach(el => {
        el.addEventListener("click", () => {
          const lng = parseFloat(el.dataset.lng);
          const lat = parseFloat(el.dataset.lat);
          const name = el.dataset.name;
          const cc = el.dataset.cc;
          isSelectingCity = true;
          bottomInput.value = name;
          bottomResults.style.display = "none";
          showLoading(t('loading'));
          switchCity(name, lng, lat, cc);
          setTimeout(() => { isSelectingCity = false; }, 100);
        });
      });
    } catch(e) {
      console.error('搜索失败:', e);
      bottomResults.innerHTML = `<div class="result-item" style="color:#888">${t('searchFailed')}</div>`;
      bottomResults.style.display = "block";
    }
  }
  
  // 点击外部关闭搜索结果
  document.addEventListener("click", e => {
    if (!e.target.closest(".bottom-controls")) bottomResults.style.display = "none";
  });
  
  // 自驾时长滑动条
  const slider = document.getElementById('drive-time-slider');
  const sliderTime = document.getElementById('slider-time');
  
  slider.addEventListener('input', () => {
    MAX_DRIVE_HOURS = parseFloat(slider.value);
    sliderTime.textContent = `${MAX_DRIVE_HOURS.toFixed(1)}h`;
    // 重新渲染地图
    if (allCountyFeatures.length > 0) {
      renderMap(true);
    }
  });
  
  // 同步滑动条值
  slider.value = MAX_DRIVE_HOURS;
  sliderTime.textContent = `${MAX_DRIVE_HOURS.toFixed(1)}h`;
}

// 初始化定位按钮
document.addEventListener('DOMContentLoaded', initLocateButton);
// 初始化底部控件
document.addEventListener('DOMContentLoaded', initBottomControls);
// 初始化景点面板
document.addEventListener('DOMContentLoaded', initScenicPanel);

// ── 首次加载 ──
(async function init() {
  // 检查 URL 参数是否指定了城市
  const urlCity = new URLSearchParams(window.location.search).get('city');

  if (urlCity) {
    // 有 URL 参数：跳过欢迎屏，直接加载
    dismissWelcome();
    // 立即用 urlCity 更新标题/图例/搜索框，不等语言文件加载
    const _lang = localStorage.getItem('lang') || detectLang();
    const _subtitleSuffix = { 'zh-CN': '耗时&距离', 'zh-TW': '耗時&距離', 'ja': '所要時間&距離', 'en': 'Time & Distance' }[_lang] || 'Time & Distance';
    const _originPrefix = { 'zh-CN': '出发市', 'zh-TW': '出發市', 'ja': '出発市', 'en': 'Origin City' }[_lang] || 'Origin City';
    document.getElementById("title-sub").textContent = `${urlCity} · ${_subtitleSuffix}`;
    document.getElementById("legend-origin").textContent = `${_originPrefix} (${urlCity})`;
    document.title = urlCity;
    searchInput.value = urlCity;
    showLoading(t('loading') || '...');

    try {
      const res = await fetch(`https://restapi.amap.com/v3/place/text?key=6db4289a25ce8104d8a6607311568479&types=150100|150200|150300|150400|150500|150600&city=&children=1&extensions=base&page=1&offset=8&keywords?q=${encodeURIComponent(urlCity)}&format=json&addressdetails=1&limit=1&accept-language=${window.LANG?.code?.startsWith("zh-TW") ? "zh-TW,zh" : window.LANG?.code === "ja" ? "ja" : window.LANG?.code === "zh-CN" ? "zh" : "en"}`, { headers: { 'User-Agent': 'DriveEscape/1.0' } });
      const data = await res.json();
      if (data.length > 0) {
        const item = data[0];
        const name = item.display_name.split(",")[0];
        const cc = item.address?.country_code || '';
        searchInput.value = name;
        await switchCity(name, parseFloat(item.lon), parseFloat(item.lat), cc);
        return;
      }
    } catch(e) {}
  }

  // 没有 URL 参数：显示欢迎屏，不加载默认城市
  // 欢迎屏已在 HTML 中默认显示，等用户选择城市
})();
</script>
